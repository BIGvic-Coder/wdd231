<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium gradient matching a modern tech aesthetic -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Base Circle with shadow -->
  <circle cx="50" cy="50" r="45" fill="url(#logo-grad)" filter="url(#shadow)" />

  <!-- Code Bracket / Geometric Shapes -->
  <path d="M 32 38 L 20 50 L 32 62" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 68 38 L 80 50 L 68 62" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Sleek Forward Slash representing coding/web -->
  <line x1="56" y1="30" x2="44" y2="70" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
</svg>
